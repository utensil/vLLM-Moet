name: Build SM120 image and push to GHCR
on:
  push:
    branches: [main]
    paths: ['Dockerfile.sm120-v024', 'patch/**', 'kernels/**', '.github/workflows/build.yml']
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" \
                      "$AGENT_TOOLSDIRECTORY" /usr/local/lib/android /opt/hostedtoolcache
          sudo docker image prune --all --force || true
          df -h /
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.sm120-v024
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/vllm-moet-sm120:v024
          provenance: false
